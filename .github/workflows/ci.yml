name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal default permissions; jobs that need more (e.g. to publish
# coverage or push images) opt back in.
permissions:
  contents: read

# Cancel in-progress runs of the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Go backend: build, test (with race), vet, coverage, golangci-lint.
  # ────────────────────────────────────────────────────────────────────
  backend:
    name: Go Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The new-code lint compares against origin/main. A PR checkout
          # otherwise only fetches the synthetic merge ref.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Verify modules
        run: go mod verify

      # Static analysis. Catches the "go vet was disabled" issue from
      # the audit (cmd/test_echo/main.go:16 was broken for a while).
      - name: go vet (all packages)
        run: go vet ./...

      - name: Build
        run: |
          go build -ldflags="-w -s" -o /tmp/openwrt-controller ./cmd/openwrt-controller
          # All other cmd/* must also compile (test_echo, scratch, etc.).
          for pkg in $(go list ./cmd/...); do
            go build -o /dev/null "$pkg"
          done

      # Real test step. The previous CI used `|| true` which silently
      # swallowed test failures — fixed in this commit.
      # Timeout is generous because -race instrumentation adds ~10x
      # overhead. 8 packages with the race detector typically finish
      # in ~15-45s on GitHub runners, but we pad to 180s for safety.
      - name: Test (with -race)
        run: go test -race -count=1 -timeout=180s ./...

      - name: Coverage
        run: |
          go test -count=1 -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | tail -1
          # Coverage is informational for now (current ~3%). Once we
          # have a real test suite this threshold can be raised to
          # gate merges.
          COV=$(go tool cover -func=coverage.out | awk '/total:/ {print substr($3, 1, length($3)-1)}')
          echo "::notice::Total coverage: ${COV}%"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7
          if-no-files-found: ignore

      # golangci-lint — runs the curated linter set we configured in
      # .golangci.yml (errcheck, gosec, staticcheck, etc.). The
      # --new-from-rev=origin/main flag reports only issues introduced
      # in this PR, so the existing ~50 errcheck/gosec findings don't
      # block merge. New issues are caught as they appear.
      - name: golangci-lint (new code only)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          args: --timeout=5m --new-from-rev=origin/main

      # Full-repo lint, info-only, so we can track the existing
      # tech-debt count over time without blocking merges.
      - name: golangci-lint (full repo, info only)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          args: --timeout=5m --out-format=line-number
        continue-on-error: true

      # govulncheck: scan for known CVEs in the Go module graph.
      # We use the official Go tool — no third-party DB. Version is
      # pinned to a specific release for reproducibility; bump via PR
      # after reviewing the release notes at
      # https://github.com/golang/vuln/releases.
      - name: govulncheck
        timeout-minutes: 3
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
          govulncheck ./...

  # ────────────────────────────────────────────────────────────────────
  # Vue frontend: install, lint, build. Lint is opt-in until we wire
  # an eslint config; for now we run the Vite build as a smoke test.
  # ────────────────────────────────────────────────────────────────────
  frontend:
    name: Vue Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      # Type-check Vue SFCs and JS. vue-tsc is the canonical way; the
      # project is currently JS-only so this is a no-op until a tsconfig
      # lands.
      - name: Type-check
        run: |
          if [ -f tsconfig.json ]; then
            npx vue-tsc --noEmit
          else
            echo "No tsconfig.json; skipping type-check"
          fi
        continue-on-error: true

      - name: Unit tests (vitest)
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 7
          if-no-files-found: ignore

  # ────────────────────────────────────────────────────────────────────
  # Docker image build (no push by default; tag-and-push lives in the
  # release workflow).
  # ────────────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: nerve-center:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────
  # Secret scanner. Runs gitleaks against the full git history. Cheap
  # insurance against accidentally committed API keys / JWT secrets.
  # ────────────────────────────────────────────────────────────────────
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect hardcoded secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
