<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Nerve Center — Surveyor (Basic Mode)</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: monospace; background: #000; color: #39FF14; margin: 0; padding: 20px; }
    h1 { font-size: 18px; margin: 0 0 6px 0; color: #fff; }
    .sub { font-size: 11px; color: #888; margin-bottom: 24px; }
    .card { background: #0a0a0a; border: 1px solid #39FF14; padding: 16px; margin-bottom: 16px; }
    label { display: block; font-size: 11px; color: #888; margin: 12px 0 4px; }
    input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #39FF14; font-family: monospace; font-size: 16px; }
    input:focus { outline: none; border-color: #39FF14; }
    button { display: block; width: 100%; padding: 16px; margin-top: 16px; background: #39FF14; color: #000; border: none; font-family: monospace; font-size: 16px; font-weight: bold; cursor: pointer; }
    button:disabled { background: #333; color: #888; cursor: not-allowed; }
    .status { font-size: 12px; padding: 8px; margin-top: 12px; border-radius: 4px; }
    .ok { background: #0a3a0a; color: #39FF14; border: 1px solid #39FF14; }
    .err { background: #3a0a0a; color: #ff5555; border: 1px solid #ff5555; }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }
  </style>
</head>
<body>
  <h1>📡 Surveyor (Basic Mode)</h1>
  <div class="sub">No JavaScript. Use this if your browser blocks the full PWA.</div>

  <div class="card">
    <div style="font-size: 12px; color: #888;">Survey ID</div>
    <div id="surveyId" style="font-size: 18px; color: #39FF14; word-break: break-all;">—</div>
    <div style="font-size: 11px; color: #888; margin-top: 4px;">Token from URL ?token=… is held by the form below.</div>
  </div>

  <div class="card">
    <div style="font-size: 12px; color: #888; margin-bottom: 8px;">Auto-fill GPS (one shot)</div>
    <button id="gpsBtn" type="button">📍 Get my current location</button>
    <div id="gpsStatus" style="font-size: 11px; margin-top: 6px; color: #888;"></div>
  </div>

  <form id="f" method="POST">
    <div class="card">
      <label>Latitude</label>
      <input type="number" id="lat" name="lat" step="0.000001" min="-90" max="90" required>

      <label>Longitude</label>
      <input type="number" id="lon" name="lon" step="0.000001" min="-180" max="180" required>

      <label>Accuracy (m, optional)</label>
      <input type="number" id="acc" name="accuracy_m" step="1" min="0" placeholder="auto-filled by GPS button">

      <label>Timestamp (ms since epoch, optional)</label>
      <input type="number" id="ts" name="ts" step="1" placeholder="auto-filled when sending">

      <button type="submit">▶ SEND GPS SAMPLE</button>
      <div id="status" class="status" style="display: none;"></div>
    </div>
  </form>

  <script>
    // Tiny inline JS is allowed because this page has no CSP. The
    // main PWA blocks inline scripts; this fallback page is a
    // deliberate exception so users with no-JS-ish environments
    // can still submit samples.
    (function() {
      var path = location.pathname.split('/');
      var id = path[path.length - 1] || '';
      document.getElementById('surveyId').textContent = id || 'MISSING — use /basic-mode.html?id=…';

      // If id is missing, allow ?id=… for convenience.
      var qs = new URLSearchParams(location.search);
      if (!id && qs.get('id')) id = qs.get('id');
      if (id) document.getElementById('surveyId').textContent = id;

      var form = document.getElementById('f');
      form.action = '/api/surveys/' + encodeURIComponent(id) + '/samples';
      document.getElementById('gpsBtn').addEventListener('click', function() {
        var s = document.getElementById('gpsStatus');
        s.textContent = 'requesting GPS…';
        if (!navigator.geolocation) { s.textContent = 'no geolocation API'; return; }
        navigator.geolocation.getCurrentPosition(function(p) {
          document.getElementById('lat').value = p.coords.latitude.toFixed(6);
          document.getElementById('lon').value = p.coords.longitude.toFixed(6);
          document.getElementById('acc').value = Math.round(p.coords.accuracy);
          s.textContent = 'GPS filled in — tap SEND';
        }, function(e) {
          s.textContent = 'GPS error ' + e.code + ': ' + (e.message || 'denied');
        }, { enableHighAccuracy: true, timeout: 20000 });
      });
      form.addEventListener('submit', function(ev) {
        ev.preventDefault();
        var btn = form.querySelector('button[type=submit]');
        btn.disabled = true;
        btn.textContent = 'SENDING…';
        var st = document.getElementById('status');
        st.style.display = 'block';
        st.className = 'status';
        st.textContent = 'sending…';
        document.getElementById('ts').value = Date.now();
        var fd = new FormData(form);
        var body = {
          lat: parseFloat(fd.get('lat')),
          lon: parseFloat(fd.get('lon')),
          accuracy_m: fd.get('accuracy_m') ? parseFloat(fd.get('accuracy_m')) : undefined,
          ts: fd.get('ts') ? parseInt(fd.get('ts'), 10) : undefined,
        };
        // X-Survey-Token comes from ?token= in the URL.
        var token = qs.get('token') || '';
        fetch(form.action, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Survey-Token': token
          },
          body: JSON.stringify(body)
        }).then(function(r) {
          if (r.status === 202) {
            st.className = 'status ok';
            st.textContent = '✓ sample accepted (' + r.status + '). Walk somewhere else and send another.';
            btn.disabled = false;
            btn.textContent = '▶ SEND GPS SAMPLE';
          } else {
            return r.text().then(function(t) {
              st.className = 'status err';
              st.textContent = '✗ ' + r.status + ' — ' + t;
              btn.disabled = false;
              btn.textContent = '▶ SEND GPS SAMPLE';
            });
          }
        }).catch(function(e) {
          st.className = 'status err';
          st.textContent = '✗ network error: ' + e.message;
          btn.disabled = false;
          btn.textContent = '▶ SEND GPS SAMPLE';
        });
      });
    })();
  </script>
</body>
</html>
