# Gitleaks configuration for openwrt-controller.
# Auto-detected by gitleaks-action@v2 from the repo root.

[allowlist]
description = "Exclude test files, generated files, and known false positives"
stopwords = [
  "GENERATE_STRONG_PASSWORD",
  "postgres:postgres",
  "jwt_secret_value",
  "test-key",
  "telegraf-test",
]
paths = [
  '''_test\.go$''',
  '''\.env\.example$''',
  '''\.github/workflows/''',
  '''go\.sum$''',
  '''package-lock\.json$''',
]

# The built-in generic-api-key rule is kept; stopwords above apply
# to it automatically. No rule override needed.
