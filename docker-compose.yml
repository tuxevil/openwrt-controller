services:
  openwrt-controller:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openwrt_controller
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/openwrthub
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_ORG=openwrthub
      - INFLUX_BUCKET=telemetry
      - INFLUX_TOKEN=REPLACE_WITH_INFLUX_TOKEN
      - JWT_SECRET=REPLACE_WITH_JWT_SECRET
    depends_on:
      - postgres
      - influxdb
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: openwrt_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openwrthub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7-alpine
    container_name: openwrt_influx
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: REPLACE_WITH_INFLUX_PASSWORD
      DOCKER_INFLUXDB_INIT_ORG: openwrthub
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: REPLACE_WITH_INFLUX_TOKEN
    volumes:
      - influxdata:/var/lib/influxdb2
    restart: unless-stopped

volumes:
  pgdata:
  influxdata:
