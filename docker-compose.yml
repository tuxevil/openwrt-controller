version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: openwrt_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openwrthub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7-alpine
    container_name: openwrt_influx
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: REPLACE_WITH_INFLUX_PASSWORD
      DOCKER_INFLUXDB_INIT_ORG: openwrthub
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: REPLACE_WITH_INFLUX_TOKEN
    volumes:
      - influxdata:/var/lib/influxdb2
    restart: unless-stopped

volumes:
  pgdata:
  influxdata:
